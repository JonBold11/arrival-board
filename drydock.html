<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Arrival Board - Drydock</title>
  <link rel="stylesheet" href="./drydock.css?v=font-final-001">
</head>
<body class="day-mode">
  <div id="rotateNotice" class="rotate-message" aria-live="polite">
    ROTATE DEVICE FOR ARRIVAL BOARD
  </div>

  <main class="viewport">
    <section id="boardDriftLayer" class="dashboard-stage">
      <header id="boardHeader" class="stage-header" title="Tap to enter fullscreen">
        <span id="arrivalsTrigger">TIME UNTIL ARRIVAL</span>
      </header>

      <section id="etaBoard" class="primary-panel" aria-live="polite">
        <div class="days-value-wrap">
          <div id="daysValue" class="days-value">---</div>
          <div class="days-label">DAYS REMAIN</div>
          <div id="etaValue" class="months-days">-- MONTHS -- DAYS</div>
          <div id="etaStatus" class="status-hidden">STATUS: EN ROUTE</div>
        </div>
      </section>

      <section id="tickerBoard" class="message-panel" aria-live="polite">
        <div class="panel-caption">CURRENT MESSAGE</div>
        <div class="message-window">
          <div id="tickerTrack" class="message-track">
            <span id="tickerText">THE WORK IS THE WAY.</span>
          </div>
        </div>
      </section>

      <section id="bottomRow" class="bottom-row" aria-label="Local information">
        <article class="info-card">
          <div class="card-caption">LOCAL TIME</div>
          <div id="timeValue" class="card-value">--:--:--</div>
          <div class="card-subvalue">HOURS : MINUTES : SECONDS</div>
        </article>

        <article class="info-card">
          <div class="card-caption">CURRENT DATE</div>
          <div id="dateValue" class="card-value">---</div>
          <div id="weekdayValue" class="card-subvalue">---</div>
        </article>
      </section>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
